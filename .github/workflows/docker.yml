name: Docker image (ghcr.io)

# Builds the CUDA 12.1 image from docker/pure_pip.Dockerfile.cuda_12_1 and pushes it to
# the GitHub Container Registry (ghcr.io) - this is what populates the repo's
# "Packages" section. MANUAL only (workflow_dispatch): the CUDA-devel base + full
# deps is a large, slow build, so it is deliberately decoupled from tag releases.
# Uses the built-in GITHUB_TOKEN (no extra secrets). After the first push, set the
# package's visibility to Public in the repo's Packages settings if you want it
# pullable without auth.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. 0.1.0 or latest)"
        default: "latest"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The CUDA-devel image is large; reclaim runner disk before building.
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          df -h

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase the image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/pure_pip.Dockerfile.cuda_12_1
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:${{ github.event.inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
