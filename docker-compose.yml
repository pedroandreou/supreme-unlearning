x-common-config: &common-config # anchor
  user: vscode
  command: /bin/bash
  environment:
    - CUDA_VISIBLE_DEVICES=0,1,2,3,4,5,6,7
  env_file:
    - .env
  volumes:
    - ./:/app/host:rw
    - vscode-server:/home/vscode/.vscode-server:rw
    - ${HOME}/.vscode-server/extensions:/home/vscode/.vscode-server/extensions:ro
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all # Use all GPUs
            capabilities: [gpu, utility, compute]
  runtime: nvidia
  stdin_open: true
  tty: true
  healthcheck:
    test: ["CMD-SHELL", "command -v nvidia-smi && nvidia-smi || exit 1"]
    interval: 20s
    timeout: 5s
    retries: 2
    start_period: 1s
  labels:
    - autoheal=true
    - autoheal.stop.timeout=1

services:
  cuda_12_1_from_scratch:
    container_name: framework_cuda_12_1_from_scratch
    build:
      context: .
      # dockerfile: pip_uv.Dockerfile.cuda_12_1
      dockerfile: pure_pip.Dockerfile.cuda_12_1
      args:
        BUILDKIT_INLINE_CACHE: 1
    image: framework-cuda-12-1:dev
    <<: *common-config # alias

  # Pull a ready-made runtime image (published by .github/workflows/docker.yml)
  # instead of building from the Dockerfile. For running experiments without a
  # local build; not the dev container (see cuda_12_1_devcontainer below).
  cuda_12_1_pulled:
    container_name: framework_cuda_12_1_pulled
    image: ghcr.io/pedroandreou/supreme-unlearning:0.1.2
    <<: *common-config # alias

  # Prebuilt dev container image (CUDA Dockerfile + devcontainer features baked in),
  # published by .github/workflows/devcontainer.yml. The dev container extends this
  # service (see docker-compose.dev.yml) so "Reopen in Container" pulls a ready-made
  # image instead of building locally. To build locally instead, point the dev
  # override back at cuda_12_1_from_scratch.
  cuda_12_1_devcontainer:
    container_name: framework_cuda_12_1_devcontainer
    image: ghcr.io/pedroandreou/supreme-unlearning-devcontainer:latest
    <<: *common-config # alias

  autoheal:
    image: willfarrell/autoheal
    container_name: autoheal
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  vscode-server:
    name: vscode-server-extensions
