name: CI

# Lint + format check on every push to main and every PR. Runs `make quality`
# directly (ruff pinned to match .pre-commit-config.yaml) so the target dirs live
# only in the Makefile. Fast - no torch needed.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
      - name: Install ruff (pinned)
        run: python -m pip install ruff==0.6.9
      # Reuse the Makefile target (RUFF=ruff -> system ruff, not a venv) so the
      # lint/format dirs (check_dirs) have a single source of truth.
      - name: Lint + format check
        run: make quality RUFF=ruff

  build-check:
    # Confirms the package still builds and its metadata is valid (catches
    # pyproject/version/README-render regressions before a release).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
      # Mirrors the Makefile `build` recipe (kept inline, not `make build`, to keep
      # the system Python out of a venv). Keep these commands in sync with the Makefile.
      - run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
