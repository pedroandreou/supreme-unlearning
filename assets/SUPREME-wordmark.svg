<svg width="1600" height="1130" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1130">
  <!-- Background with subtle gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>

    <!-- Glow effects for the blocks -->
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow-gold" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="1130" fill="url(#bg-gradient)"/>

  <!-- Decorative yellow lines (top) -->
  <line x1="0" y1="15" x2="1600" y2="15" stroke="#FFD700" stroke-width="3" opacity="0.8"/>
  <line x1="0" y1="25" x2="1600" y2="25" stroke="#FFED4E" stroke-width="2" opacity="0.6"/>

  <!-- Decorative yellow lines (bottom) -->
  <line x1="0" y1="1110" x2="1600" y2="1110" stroke="#FFED4E" stroke-width="2" opacity="0.6"/>
  <line x1="0" y1="1120" x2="1600" y2="1120" stroke="#FFD700" stroke-width="3" opacity="0.8"/>

  <!-- ============================================================
       LAYER 2: PIPELINE STAGES
       Three crystals (T -> U -> E) centred on the canvas, each labelled
       with its stage name and the corresponding seed symbol below.
       translate(0, -5) sets the centre-column gap between Layer 1
       (badges, y=440) and Layer 2 (header top) to ~90px.
       ============================================================ -->
  <g id="pipeline-stages" transform="translate(0, -5)">
    <!-- Section header -->
    <text x="800" y="555" font-family="Arial, sans-serif" font-size="28"
          fill="#FFD700" text-anchor="middle" font-weight="bold" letter-spacing="4">PIPELINE STAGES</text>


    <!-- TRAINING crystal (green, left) - represents s_t -->
    <g filter="url(#glow-green)">
      <path d="M 535 715 L 571 595 L 619 595 L 655 715 L 595 730 Z"
            fill="#4CAF50" stroke="#66FF66" stroke-width="3.5" opacity="0.98"/>
      <path d="M 571 595 L 595 580 L 643 580 L 619 595 Z"
            fill="#66FF66" opacity="0.9"/>
      <text x="595" y="675" font-family="Arial, sans-serif" font-size="44"
            fill="#FFFFFF" text-anchor="middle" font-weight="900">T</text>
      <circle cx="595" cy="660" r="32" fill="#4CAF50" opacity="0.2">
        <animate attributeName="r" values="32;38;32" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.2;0.4;0.2" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- UNLEARNING crystal (gold, centre) - represents s_u -->
    <g filter="url(#glow-gold)">
      <path d="M 740 715 L 776 595 L 824 595 L 860 715 L 800 730 Z"
            fill="#FFD700" stroke="#FFED4E" stroke-width="3.5" opacity="0.98"/>
      <path d="M 776 595 L 800 580 L 848 580 L 824 595 Z"
            fill="#FFED4E" opacity="0.9"/>
      <text x="800" y="675" font-family="Arial, sans-serif" font-size="44"
            fill="#1a1a1a" text-anchor="middle" font-weight="900">U</text>
      <circle cx="800" cy="660" r="32" fill="#FFD700" opacity="0.2">
        <animate attributeName="r" values="32;38;32" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.2;0.4;0.2" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- EVALUATION crystal (purple, right) - represents s_e -->
    <g filter="url(#glow-purple)">
      <path d="M 945 715 L 981 595 L 1029 595 L 1065 715 L 1005 730 Z"
            fill="#9370DB" stroke="#B19CD9" stroke-width="3.5" opacity="0.98"/>
      <path d="M 981 595 L 1005 580 L 1053 580 L 1029 595 Z"
            fill="#B19CD9" opacity="0.9"/>
      <text x="1005" y="675" font-family="Arial, sans-serif" font-size="44"
            fill="#FFFFFF" text-anchor="middle" font-weight="900">E</text>
      <circle cx="1005" cy="660" r="32" fill="#9370DB" opacity="0.2">
        <animate attributeName="r" values="32;38;32" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.2;0.4;0.2" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Flow arrow T -> U -->
    <path d="M 670 660 L 720 660"
          stroke="#FFD700" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.9">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 712 651 L 720 660 L 712 669"
          stroke="#FFD700" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.9">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </path>

    <!-- Flow arrow U -> E -->
    <path d="M 875 660 L 925 660"
          stroke="#FFD700" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.9">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 917 651 L 925 660 L 917 669"
          stroke="#FFD700" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.9">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </path>

    <!-- Stage names: under each crystal -->
    <text x="595" y="765" font-family="Arial, sans-serif" font-size="18"
          fill="#66FF66" text-anchor="middle" font-weight="bold" letter-spacing="2">TRAINING</text>
    <text x="800" y="765" font-family="Arial, sans-serif" font-size="18"
          fill="#FFED4E" text-anchor="middle" font-weight="bold" letter-spacing="2">UNLEARNING</text>
    <text x="1005" y="765" font-family="Arial, sans-serif" font-size="18"
          fill="#B19CD9" text-anchor="middle" font-weight="bold" letter-spacing="2">EVALUATION</text>

    <!-- Seed symbols: directly under each stage name. -->
    <text x="595" y="800" font-family="Arial, sans-serif" font-size="28"
          fill="#66FF66" text-anchor="middle" font-weight="700" font-style="italic">s_t</text>
    <text x="800" y="800" font-family="Arial, sans-serif" font-size="28"
          fill="#FFED4E" text-anchor="middle" font-weight="700" font-style="italic">s_u</text>
    <text x="1005" y="800" font-family="Arial, sans-serif" font-size="28"
          fill="#B19CD9" text-anchor="middle" font-weight="700" font-style="italic">s_e</text>

    <!-- Multiplicity row: explains how many of each seed and PER WHAT. Anchors
         I/J/K to their referent so they don't read as orphan letters: I per
         pipeline; J per training seed; K per unlearning seed. -->
    <text x="595" y="835" font-family="Arial, sans-serif" font-size="16"
          text-anchor="middle" font-style="italic" fill="#FFFFFF">
      ×<tspan fill="#66FF66" font-weight="700"> I</tspan> per pipeline
    </text>
    <text x="800" y="835" font-family="Arial, sans-serif" font-size="16"
          text-anchor="middle" font-style="italic" fill="#FFFFFF">
      ×<tspan fill="#FFED4E" font-weight="700"> J</tspan> per <tspan fill="#66FF66" font-weight="700">s_t</tspan>
    </text>
    <text x="1005" y="835" font-family="Arial, sans-serif" font-size="16"
          text-anchor="middle" font-style="italic" fill="#FFFFFF">
      ×<tspan fill="#B19CD9" font-weight="700"> K</tspan> per <tspan fill="#FFED4E" font-weight="700">s_u</tspan>
    </text>

    <!-- Notation legend on the left. Title + six text lines defining the three
         seed symbols (s_t / s_u / s_e) and the three count letters (I / J / K).
         Block is vertically centred between the section header above (~y=530)
         and the multiplicity row below (~y=830) - midpoint y=680. -->
    <text x="35" y="612" font-family="Arial, sans-serif" font-size="16"
          fill="#FFD700" font-weight="bold" letter-spacing="2">NOTATION</text>
    <line x1="35" y1="620" x2="130" y2="620" stroke="#FFD700" stroke-width="1.5" opacity="0.6"/>

    <text x="35" y="652" font-family="Arial, sans-serif" font-size="18" font-style="italic" fill="#FFFFFF">
      <tspan fill="#66FF66" font-weight="700" font-size="22">s_t</tspan> = training seed
    </text>
    <text x="35" y="677" font-family="Arial, sans-serif" font-size="18" font-style="italic" fill="#FFFFFF">
      <tspan fill="#FFED4E" font-weight="700" font-size="22">s_u</tspan> = unlearning seed
    </text>
    <text x="35" y="702" font-family="Arial, sans-serif" font-size="18" font-style="italic" fill="#FFFFFF">
      <tspan fill="#B19CD9" font-weight="700" font-size="22">s_e</tspan> = evaluation seed
    </text>
    <text x="35" y="732" font-family="Arial, sans-serif" font-size="18" font-style="italic" fill="#FFFFFF">
      <tspan fill="#66FF66" font-weight="700" font-size="22">I</tspan> = number of training seeds
    </text>
    <text x="35" y="757" font-family="Arial, sans-serif" font-size="18" font-style="italic" fill="#FFFFFF">
      <tspan fill="#FFED4E" font-weight="700" font-size="22">J</tspan> = unlearning seeds per <tspan fill="#66FF66" font-weight="700">s_t</tspan>
    </text>
    <text x="35" y="782" font-family="Arial, sans-serif" font-size="18" font-style="italic" fill="#FFFFFF">
      <tspan fill="#B19CD9" font-weight="700" font-size="22">K</tspan> = evaluation seeds per <tspan fill="#FFED4E" font-weight="700">s_u</tspan>
    </text>
  </g>

  <!-- Big seed-protocol strip placed below the icon area. A single pipeline supports
       all three; the protocol is chosen at invocation time via the unlearning-seeds
       and evaluation-seeds flags. -->
  <!-- ============================================================
       LAYER 3: SEED PROTOCOLS
       Three protocol options sharing a unified visual style, with seed
       symbols inside coloured per the stage legend above.
       translate(0, +55) keeps the L2->L3 centre-column gap at ~90px,
       matching the L1->L2 gap above for a uniform layer rhythm.
       ============================================================ -->
  <g id="seed-protocol-strip" transform="translate(0, 55)">
    <text x="800" y="855" font-family="Arial, sans-serif" font-size="28"
          fill="#FFD700" text-anchor="middle" font-weight="bold" letter-spacing="4">SEED PROTOCOLS</text>

    <!-- Each box shows three pieces of information:
           Title (with I/J/K colour-coded to their seeds)
           Constraint (J=K=1 / J>1, K=1 / J>1, K>1)
           Consequence: total runs per pipeline (the bottom line for the reader)
         No lowercase j/k formulas: I/J/K are now used consistently throughout. -->

    <!-- Matched: J = K = 1 -->
    <g>
      <rect x="290" y="880" width="320" height="120" rx="14"
            fill="#1a1a2e" fill-opacity="0.55" stroke="#FFD700" stroke-width="4"/>
      <text x="450" y="915" font-family="Arial, sans-serif" font-size="24"
            text-anchor="middle" font-weight="700" fill="#FFFFFF">MATCHED</text>
      <text x="450" y="945" font-family="Arial, sans-serif" font-size="15"
            text-anchor="middle" font-style="italic" fill="#FFFFFF" opacity="0.75">
        <tspan fill="#FFED4E" font-weight="700">J</tspan> = <tspan fill="#B19CD9" font-weight="700">K</tspan> = 1
      </text>
      <text x="450" y="982" font-family="Arial, sans-serif" font-size="18"
            text-anchor="middle" font-weight="700" fill="#FFD700">
        <tspan fill="#66FF66">I</tspan> runs per grid
      </text>
    </g>

    <!-- Decoupled I×J: J > 1, K = 1 -->
    <g>
      <rect x="640" y="880" width="320" height="120" rx="14"
            fill="#1a1a2e" fill-opacity="0.55" stroke="#FFD700" stroke-width="4"/>
      <text x="800" y="915" font-family="Arial, sans-serif" font-size="24"
            text-anchor="middle" font-weight="700" fill="#FFFFFF">
        DECOUPLED <tspan fill="#66FF66">I</tspan>×<tspan fill="#FFED4E">J</tspan>
      </text>
      <text x="800" y="945" font-family="Arial, sans-serif" font-size="15"
            text-anchor="middle" font-style="italic" fill="#FFFFFF" opacity="0.75">
        <tspan fill="#FFED4E" font-weight="700">J</tspan> &gt; 1,  <tspan fill="#B19CD9" font-weight="700">K</tspan> = 1
      </text>
      <text x="800" y="982" font-family="Arial, sans-serif" font-size="18"
            text-anchor="middle" font-weight="700" fill="#FFD700">
        <tspan fill="#66FF66">I</tspan> × <tspan fill="#FFED4E">J</tspan> runs per grid
      </text>
    </g>

    <!-- Decoupled I×J×K: J > 1, K > 1 -->
    <g>
      <rect x="990" y="880" width="320" height="120" rx="14"
            fill="#1a1a2e" fill-opacity="0.55" stroke="#FFD700" stroke-width="4"/>
      <text x="1150" y="915" font-family="Arial, sans-serif" font-size="24"
            text-anchor="middle" font-weight="700" fill="#FFFFFF">
        DECOUPLED <tspan fill="#66FF66">I</tspan>×<tspan fill="#FFED4E">J</tspan>×<tspan fill="#B19CD9">K</tspan>
      </text>
      <text x="1150" y="945" font-family="Arial, sans-serif" font-size="15"
            text-anchor="middle" font-style="italic" fill="#FFFFFF" opacity="0.75">
        <tspan fill="#FFED4E" font-weight="700">J</tspan> &gt; 1,  <tspan fill="#B19CD9" font-weight="700">K</tspan> &gt; 1
      </text>
      <text x="1150" y="982" font-family="Arial, sans-serif" font-size="18"
            text-anchor="middle" font-weight="700" fill="#FFD700">
        <tspan fill="#66FF66">I</tspan> × <tspan fill="#FFED4E">J</tspan> × <tspan fill="#B19CD9">K</tspan> runs per grid
      </text>
    </g>
  </g>

  <!-- SUPREME wordmark - centred on the canvas mid-line -->
  <text x="800" y="180" font-family="Arial, sans-serif" font-size="100"
        fill="#FFD700" font-weight="900" letter-spacing="-3" text-anchor="middle"
        filter="url(#glow-gold)">SUPREME</text>

  <!-- Tagline - centred -->
  <text x="800" y="235" font-family="Arial, sans-serif" font-size="22"
        fill="#FFFFFF" letter-spacing="2" opacity="0.9" text-anchor="middle">
    A Multi-GPU Framework for Reproducible Image Unlearning Method Evaluation
  </text>

  <!-- Feature badges. All share the same dark-fill + gold-outline style: they
       are six instances of one type (SUPREME capability tags), so the visual
       grouping is uniform. Semantic colours (green/gold/purple) are reserved
       for seeds elsewhere in the SVG. -->
  <g id="badges" transform="translate(380, 275)">
    <!-- Row 1: Infrastructure/Hardware features -->
    <rect x="0" y="0" width="205" height="75" rx="12"
          fill="#1a1a2e" fill-opacity="0.55" stroke="#FFD700" stroke-width="3"/>
    <text x="102" y="46" font-family="Arial, sans-serif" font-size="21"
          fill="#FFFFFF" text-anchor="middle" font-weight="700">🚀 Accelerators</text>

    <rect x="220" y="0" width="200" height="75" rx="12"
          fill="#1a1a2e" fill-opacity="0.55" stroke="#FFD700" stroke-width="3"/>
    <text x="320" y="46" font-family="Arial, sans-serif" font-size="21"
          fill="#FFFFFF" text-anchor="middle" font-weight="700">⚡ Distributed</text>

    <rect x="435" y="0" width="230" height="75" rx="12"
          fill="#1a1a2e" fill-opacity="0.55" stroke="#FFD700" stroke-width="3"/>
    <text x="550" y="46" font-family="Arial, sans-serif" font-size="21"
          fill="#FFFFFF" text-anchor="middle" font-weight="700">🎯 Multi-Precision</text>

    <!-- Row 2: Framework features -->
    <rect x="0" y="90" width="190" height="75" rx="12"
          fill="#1a1a2e" fill-opacity="0.55" stroke="#FFD700" stroke-width="3"/>
    <text x="95" y="136" font-family="Arial, sans-serif" font-size="21"
          fill="#FFFFFF" text-anchor="middle" font-weight="700">🔄 Callbacks</text>

    <rect x="205" y="90" width="180" height="75" rx="12"
          fill="#1a1a2e" fill-opacity="0.55" stroke="#FFD700" stroke-width="3"/>
    <text x="295" y="136" font-family="Arial, sans-serif" font-size="21"
          fill="#FFFFFF" text-anchor="middle" font-weight="700">📊 Loggers</text>

    <rect x="400" y="90" width="210" height="75" rx="12"
          fill="#1a1a2e" fill-opacity="0.55" stroke="#FFD700" stroke-width="3"/>
    <text x="505" y="136" font-family="Arial, sans-serif" font-size="21"
          fill="#FFFFFF" text-anchor="middle" font-weight="700">🔗 Reproducible</text>

    <rect x="625" y="90" width="190" height="75" rx="12"
          fill="#1a1a2e" fill-opacity="0.55" stroke="#FFD700" stroke-width="3"/>
    <text x="720" y="136" font-family="Arial, sans-serif" font-size="21"
          fill="#FFFFFF" text-anchor="middle" font-weight="700">🔧 Extensible</text>
  </g>

  <!-- Lightning Fabric panel (info-panel scheme: gold outline, dark fill).
       The pulsing green dots are status indicators (semantic green = active),
       not seed colours - they stay green. -->
  <g id="lightning-fabric" transform="translate(1280, 120)">
    <rect x="0" y="0" width="290" height="380" rx="10" fill="none"
          stroke="#FFD700" stroke-width="3" stroke-dasharray="8,4" opacity="0.8"/>

    <text x="145" y="40" font-family="Arial, sans-serif" font-size="22"
          fill="#FFD700" text-anchor="middle" font-weight="bold">⚡ Lightning Fabric</text>

    <!-- GPU indicators -->
    <rect x="30" y="80" width="220" height="58" rx="6"
          fill="#1a1a2e" stroke="#FFD700" stroke-width="2"/>
    <text x="40" y="114" font-family="Arial, sans-serif" font-size="17" fill="#FFFFFF" font-weight="600">GPU 1</text>
    <circle cx="225" cy="109" r="7" fill="#66FF66" stroke="#4CAF50" stroke-width="1.5">
      <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
    </circle>

    <rect x="30" y="155" width="220" height="58" rx="6"
          fill="#1a1a2e" stroke="#FFD700" stroke-width="2"/>
    <text x="40" y="189" font-family="Arial, sans-serif" font-size="17" fill="#FFFFFF" font-weight="600">GPU 2</text>
    <circle cx="225" cy="184" r="7" fill="#66FF66" stroke="#4CAF50" stroke-width="1.5">
      <animate attributeName="opacity" values="1;0.5;1" dur="1.3s" repeatCount="indefinite"/>
    </circle>

    <text x="145" y="248" font-family="Arial, sans-serif" font-size="26"
          fill="#FFFFFF" text-anchor="middle" font-weight="bold">...</text>

    <rect x="30" y="270" width="220" height="58" rx="6"
          fill="#1a1a2e" stroke="#FFD700" stroke-width="2"/>
    <text x="40" y="304" font-family="Arial, sans-serif" font-size="17" fill="#FFFFFF" font-weight="600">GPU P</text>
    <circle cx="225" cy="299" r="7" fill="#66FF66" stroke="#4CAF50" stroke-width="1.5">
      <animate attributeName="opacity" values="1;0.5;1" dur="0.9s" repeatCount="indefinite"/>
    </circle>
  </g>


</svg>
